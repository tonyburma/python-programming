<!DOCTYPE html>
<html>

<head>
  <title>Product List</title>
</head>

<body>
  <h1>Our Products</h1>
  <ul>
    {% for item in products %}
    <li>
      <strong>{{ item.name }}</strong> - {{ item.price }}
      <p>{{ item.description }}</p>
    </li>
    <hr>
    {% endfor %}
  </ul>
  <a href="/">Back Home</a>
</body>

</html>
